name: Release

on:
  push:
    tags: ['v1.0.*']

permissions:
  contents: write

jobs:
  # ── Build for all targets (Linux + macOS) ────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: hss-linux-x86_64
            cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: hss-linux-aarch64
            cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: hss-macos-x86_64
            cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hss-macos-aarch64
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Strip leading zeros for SemVer: v1.0.0007 → 1.0.7 in Cargo.toml.
      # hss --update compares parse::<u64>() so "0007" == "7" — no breakage.
      - name: Stamp version into Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER=$(echo "${TAG#v}" | awk -F. '{printf "%d.%d.%d", $1, $2, $3}')
          perl -pi -e "s/^version = \".*\"/version = \"$SEMVER\"/" Cargo.toml

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/hss ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Publish GitHub release with all platform binaries ────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-version:refname | grep "^v1\.0\." | sed -n '2p')
          if [ -z "$PREV" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.md
          else
            git log --pretty=format:"- %s" "${PREV}..${TAG}" > CHANGELOG.md
          fi

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            hss-linux-x86_64/hss-linux-x86_64
            hss-linux-aarch64/hss-linux-aarch64
            hss-macos-x86_64/hss-macos-x86_64
            hss-macos-aarch64/hss-macos-aarch64
